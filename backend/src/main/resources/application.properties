spring.application.name=docappoint-backend

# Let Render determine the port, otherwise use 8080
server.port=${PORT:8080}

# MongoDB Atlas Connection
spring.data.mongodb.uri=mongodb+srv://<USERNAME>:<PASSWORD>@<CLUSTER>.mongodb.net/docappoint?appName=docappoint

# Google Gemini API
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent

# Logging for production
logging.level.com.docappoint=INFO
logging.level.org.springframework.web=INFO

# Disable the generated password by providing a basic UserDetailsService bean or setting a fixed password
# (Recommended: defined in SecurityConfig to use custom JWT flow instead)
spring.security.user.name=admin
spring.security.user.password=${ADMIN_PASSWORD:admin@123}
